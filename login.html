<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roster System - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .user-info {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 5px;
            display: none;
        }

        .user-info.show {
            display: block;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .user-info p {
            margin: 5px 0;
            color: #666;
        }

        .logout-btn {
            margin-top: 10px;
            background: #dc3545;
        }

        .logout-btn:hover {
            background: #c82333;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Roster Management System</h1>
            <p>Please login to continue</p>
        </div>

        <div id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password">
            </div>
            <button onclick="login()">Login</button>
        </div>

        <div id="message" class="message"></div>
        
        <div id="userInfo" class="user-info">
            <h3>Welcome!</h3>
            <p><strong>Username:</strong> <span id="displayUsername"></span></p>
            <p><strong>User Type:</strong> <span id="displayUserType"></span></p>
            <p><strong>User ID:</strong> <span id="displayUserId"></span></p>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <script>
    const API_URL = 'http://127.0.0.1:5000';

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const messageDiv = document.getElementById('message');
        const loginForm = document.getElementById('loginForm');
        const userInfo = document.getElementById('userInfo');

        if (!username || !password) {
            showMessage('Please enter both username and password', 'error');
            return;
        }

        showMessage('Attempting to login...', 'success');
        
        // First test if server is reachable
        try {
            const testResponse = await fetch(`${API_URL}/`);
            const testData = await testResponse.json();
            console.log('Server test:', testData);
        } catch (testError) {
            showMessage('Cannot connect to server at ' + API_URL + '. Make sure python simple_login.py is running!', 'error');
            console.error('Connection error:', testError);
            return;
        }

        try {
            const response = await fetch(`${API_URL}/login`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ username, password })
            });

            const data = await response.json();
            console.log('Login response:', data);

            if (data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                
                document.getElementById('displayUsername').textContent = data.user.username;
                document.getElementById('displayUserType').textContent = data.user.user_type;
                document.getElementById('displayUserId').textContent = data.user.user_id;
                
                loginForm.style.display = 'none';
                userInfo.classList.add('show');
                showMessage(`Welcome ${data.user.username}!`, 'success');
            } else {
                showMessage(data.message || 'Login failed. Check your username.', 'error');
            }
        } catch (error) {
            showMessage('Error: ' + error.message, 'error');
            console.error('Login error:', error);
        }
    }

    function logout() {
        localStorage.removeItem('user');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('userInfo').classList.remove('show');
        document.getElementById('username').value = '';
        document.getElementById('password').value = '';
        showMessage('You have been logged out', 'success');
    }

    function showMessage(msg, type) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = msg;
        messageDiv.className = `message ${type}`;
        
        setTimeout(() => {
            messageDiv.className = 'message';
        }, 5000);
    }

    window.onload = function() {
        const savedUser = localStorage.getItem('user');
        if (savedUser) {
            const user = JSON.parse(savedUser);
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayUserType').textContent = user.user_type;
            document.getElementById('displayUserId').textContent = user.user_id;
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('userInfo').classList.add('show');
            showMessage(`Welcome back ${user.username}!`, 'success');
        }
        
        // Test server connection on load
        fetch(`${API_URL}/`)
            .then(res => res.json())
            .then(data => console.log('Server is online:', data))
            .catch(err => console.error('Server not reachable:', err));
    };

    document.getElementById('password').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
    document.getElementById('username').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
